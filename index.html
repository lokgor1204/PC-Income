<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>司機收入助手 V1.6.7</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-dim: #8e8e93;
            --border-color: #d1d1d6;
            --input-bg: #f2f2f7;
            --accent-blue: #0a84ff;
        }

        .dark-mode {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --border-color: #3a3a3c;
            --input-bg: #2c2c2e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            transition: background-color 0.3s, color 0.3s;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            transition: background-color 0.3s;
            overflow: hidden; /* 防止內容溢出卡片 */
        }

        input, select {
            background: var(--input-bg) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-main) !important;
            border-radius: 12px !important;
            padding: 8px 10px !important;
            outline: none;
            font-size: 16px !important; /* 防止 iOS 自動放大 */
        }

        #privacy-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 28px;
            max-width: 400px;
            width: 100%;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        .chart-viewport {
            height: 160px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 6px;
            padding: 25px 5px 5px 5px;
            position: relative;
            border-bottom: 1px solid var(--border-color);
        }

        .y-guide {
            position: absolute;
            left: 0;
            right: 0;
            border-top: 1px dashed var(--border-color);
            opacity: 0.3;
            pointer-events: none;
        }

        .bar-wrapper {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            position: relative;
        }

        .bar-total-label {
            position: absolute;
            top: -20px;
            font-size: 9px;
            font-weight: 900;
            color: var(--text-main);
            white-space: nowrap;
        }

        .bar-stack {
            width: 100%;
            display: flex;
            flex-direction: column-reverse;
            border-radius: 6px 6px 0 0;
            overflow: hidden;
            background: rgba(128,128,128,0.1);
            transition: height 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            min-height: 2px;
        }

        .bg-uber { background-color: #2563eb; }
        .bg-amap { background-color: #3b82f6; }
        .bg-didi { background-color: #f97316; }
        .bg-tada { background-color: #eab308; }
        .bg-other { background-color: #a855f7; }

        .list-scroll {
            max-height: 120px; 
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .theme-toggle {
            padding: 6px 10px;
            border-radius: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            font-size: 16px;
        }
    </style>
</head>
<body class="p-4">

    <div id="privacy-modal">
        <div class="modal-content border border-gray-200 dark:border-gray-800">
            <div class="text-4xl mb-4">🛡️</div>
            <h3 class="text-xl font-black mb-3">隱私與數據聲明</h3>
            <div class="text-sm text-gray-500 dark:text-gray-400 space-y-3 leading-relaxed mb-6">
                <p>本程式為純本地應用工具。為了保護您的隱私：</p>
                <ul class="text-left bg-gray-100 dark:bg-white/5 p-3 rounded-xl space-y-2">
                    <li class="flex items-start gap-2">✅ <span class="text-xs">數據僅儲存於您目前使用的手機瀏覽器內。</span></li>
                    <li class="flex items-start gap-2">🚫 <span class="text-xs">數據並不會上傳到任何伺服器。</span></li>
                    <li class="flex items-start gap-2">⚠️ <span class="text-xs">清除瀏覽器緩存將導致數據丟失，請自行留意。</span></li>
                </ul>
                <p class="font-bold text-gray-700 dark:text-gray-200">請各位放心使用。</p>
            </div>
            <button onclick="acceptPrivacy()" class="w-full bg-blue-500 text-white py-4 rounded-2xl font-black active:opacity-70 shadow-lg shadow-blue-500/20">
                我明白並接受
            </button>
        </div>
    </div>

    <div class="max-w-md mx-auto space-y-4 pb-24">
        
        <div class="flex justify-between items-start pt-4">
            <div>
                <h1 class="text-xl font-black italic">司機助手 <span class="text-[10px] not-italic opacity-30">V1.6.7</span></h1>
                <div class="relative mt-1">
                    <span id="date-label" class="text-blue-500 font-bold underline cursor-pointer text-sm">選擇日期...</span>
                    <input type="date" id="date-picker" class="absolute inset-0 opacity-0 cursor-pointer">
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="manualToggleTheme()" class="theme-toggle" id="theme-btn">🌓</button>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">今日純利</p>
                    <h2 id="summary-profit" class="text-3xl font-black text-green-500">$0</h2>
                </div>
            </div>
        </div>

        <div class="glass-card p-5 space-y-6">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 block mb-1 uppercase text-blue-600">UBER</label>
                    <input type="number" id="val-u" class="w-full text-lg font-bold" placeholder="0" inputmode="decimal">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-blue-400 block mb-1 uppercase">AMAP 高德</label>
                    <input type="number" id="val-a" class="w-full text-lg font-bold" placeholder="0" inputmode="decimal">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-orange-400 block mb-1 uppercase">DIDI 滴滴</label>
                    <input type="number" id="val-d" class="w-full text-lg font-bold" placeholder="0" inputmode="decimal">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-yellow-500 block mb-1 uppercase">TADA</label>
                    <input type="number" id="val-t" class="w-full text-lg font-bold" placeholder="0" inputmode="decimal">
                </div>
            </div>

            <!-- 其他收入 -->
            <div>
                <div class="flex justify-between items-end mb-2">
                    <label class="text-[10px] font-bold text-purple-500 uppercase tracking-widest">其他收入</label>
                    <span id="total-other-label" class="text-sm font-black text-purple-600 dark:text-purple-400">總計: $0</span>
                </div>
                <div class="flex gap-2">
                    <input type="number" id="other-val" class="flex-1 min-w-0" placeholder="金額" inputmode="decimal">
                    <button onclick="addItem('o')" class="bg-purple-500 text-white px-4 rounded-xl font-bold active:opacity-70 shrink-0">＋</button>
                </div>
                <div id="list-o" class="list-scroll mt-2 space-y-1"></div>
            </div>

            <!-- 支出區 - 優化佈局防止溢出 -->
            <div class="pt-4 border-t border-gray-100 dark:border-gray-800">
                <div class="flex justify-between items-end mb-2">
                    <label class="text-[10px] font-bold text-red-500 uppercase tracking-widest">支出項目</label>
                    <span id="total-exp-label" class="text-sm font-black text-red-600 dark:text-red-400">總計: $0</span>
                </div>
                <div class="flex gap-2 items-center">
                    <select id="exp-cat" class="w-[85px] shrink-0 text-sm">
                        <option>隧道</option>
                        <option>油/電</option>
                        <option>供車</option>
                        <option>抄牌</option>
                        <option>其他</option>
                    </select>
                    <input type="number" id="exp-val" class="flex-1 min-w-0" placeholder="金額" inputmode="decimal">
                    <button onclick="addItem('e')" class="bg-red-500 text-white px-4 py-2.5 rounded-xl font-bold active:opacity-70 shrink-0">＋</button>
                </div>
                <div id="list-e" class="list-scroll mt-2 space-y-1"></div>
            </div>
        </div>

        <div class="glass-card p-5">
            <h3 class="font-bold text-sm mb-4">本週純利分析</h3>
            <div class="chart-viewport" id="chart-area">
                <div class="y-guide" style="top: 0;"></div>
                <div class="absolute right-0 top-[-8px] text-[8px] text-gray-400 font-bold uppercase">最高 $4,000</div>
                <div class="y-guide" style="top: 50%;"></div>
            </div>
            <div class="flex justify-between text-[10px] font-bold text-gray-400 mt-2 px-1 uppercase">
                <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
            </div>
            
            <div id="week-summary-details" class="mt-6 pt-4 border-t border-gray-100 dark:border-gray-800 grid grid-cols-2 gap-4">
                <div class="bg-gray-50 dark:bg-white/5 p-3 rounded-2xl">
                    <p class="text-[9px] font-bold text-gray-400 uppercase">本週總流水</p>
                    <p id="week-total-revenue" class="text-lg font-black">$0</p>
                </div>
                <div class="bg-gray-50 dark:bg-white/5 p-3 rounded-2xl">
                    <p class="text-[9px] font-bold text-gray-400 uppercase">本週總支出</p>
                    <p id="week-total-expense" class="text-lg font-black text-red-500">$0</p>
                </div>
                <div class="col-span-2 bg-green-500/10 p-3 rounded-2xl flex justify-between items-center">
                    <p class="text-[9px] font-bold text-green-600 dark:text-green-400 uppercase tracking-widest">本週累積純利</p>
                    <p id="week-total-profit" class="text-xl font-black text-green-600 dark:text-green-400">$0</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'DRIVER_APP_DATA_PERSISTENT'; 
        const THEME_KEY = 'DRIVER_APP_THEME_PERSISTENT';
        const PRIVACY_KEY = 'DRIVER_APP_PRIVACY_ACCEPTED';
        const MAX_VAL = 4000;
        
        function migrateData() {
            const oldKeys = ['DRIVER_DATA_150', 'DRIVER_DATA_V1'];
            let combinedData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            oldKeys.forEach(oldKey => {
                const oldData = localStorage.getItem(oldKey);
                if (oldData) {
                    try {
                        const parsed = JSON.parse(oldData);
                        combinedData = { ...parsed, ...combinedData };
                    } catch(e) {}
                }
            });
            return combinedData;
        }

        let db = migrateData();
        let currentDay = "";
        let isDarkMode = false;

        window.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            const offset = now.getTimezoneOffset() * 60000;
            currentDay = new Date(now.getTime() - offset).toISOString().split('T')[0];
            
            checkPrivacy();
            initTheme();
            setupListeners();
            loadDay(currentDay);
        });

        function checkPrivacy() {
            const accepted = localStorage.getItem(PRIVACY_KEY);
            if (!accepted) {
                document.getElementById('privacy-modal').style.display = 'flex';
            }
        }

        function acceptPrivacy() {
            localStorage.setItem(PRIVACY_KEY, 'true');
            document.getElementById('privacy-modal').style.display = 'none';
        }

        function setupListeners() {
            document.getElementById('date-picker').onchange = (e) => loadDay(e.target.value);
            ['val-u', 'val-a', 'val-d', 'val-t'].forEach(id => {
                document.getElementById(id).oninput = saveData;
            });
        }

        function initTheme() {
            const savedTheme = localStorage.getItem(THEME_KEY);
            isDarkMode = savedTheme === 'dark';
            applyTheme();
        }

        function manualToggleTheme() {
            isDarkMode = !isDarkMode;
            localStorage.setItem(THEME_KEY, isDarkMode ? 'dark' : 'light');
            applyTheme();
        }

        function applyTheme() {
            document.body.classList.toggle('dark-mode', isDarkMode);
            document.getElementById('theme-btn').innerText = isDarkMode ? '☀️' : '🌙';
            updateChart();
        }

        function loadDay(dateStr) {
            currentDay = dateStr;
            document.getElementById('date-picker').value = dateStr;
            const d = new Date(dateStr);
            document.getElementById('date-label').innerText = d.toLocaleDateString('zh-HK', { month:'short', day:'numeric', weekday:'short' });
            if(!db[currentDay]) db[currentDay] = { u:0, a:0, d:0, t:0, o:[], e:[] };
            const data = db[currentDay];
            document.getElementById('val-u').value = data.u || "";
            document.getElementById('val-a').value = data.a || "";
            document.getElementById('val-d').value = data.d || "";
            document.getElementById('val-t').value = data.t || "";
            renderLists();
            refreshUI();
        }

        function saveData() {
            if(!db[currentDay]) db[currentDay] = { u:0, a:0, d:0, t:0, o:[], e:[] };
            db[currentDay].u = parseFloat(document.getElementById('val-u').value) || 0;
            db[currentDay].a = parseFloat(document.getElementById('val-a').value) || 0;
            db[currentDay].d = parseFloat(document.getElementById('val-d').value) || 0;
            db[currentDay].t = parseFloat(document.getElementById('val-t').value) || 0;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            refreshUI();
        }

        function addItem(type) {
            const valInput = document.getElementById(type === 'o' ? 'other-val' : 'exp-val');
            const val = parseFloat(valInput.value);
            if(!val) return;
            if(type === 'o') {
                if(!db[currentDay].o) db[currentDay].o = [];
                db[currentDay].o.push({ v: val, id: Date.now() });
            } else {
                if(!db[currentDay].e) db[currentDay].e = [];
                const cat = document.getElementById('exp-cat').value;
                db[currentDay].e.push({ v: val, c: cat, id: Date.now() });
            }
            valInput.value = "";
            renderLists();
            saveData();
        }

        function removeItem(type, id) {
            db[currentDay][type] = db[currentDay][type].filter(item => item.id !== id);
            renderLists();
            saveData();
        }

        function renderLists() {
            const data = db[currentDay];
            const sumO = data.o ? data.o.reduce((acc, i) => acc + i.v, 0) : 0;
            const sumE = data.e ? data.e.reduce((acc, i) => acc + i.v, 0) : 0;
            document.getElementById('total-other-label').innerText = `總計: $${sumO}`;
            document.getElementById('total-exp-label').innerText = `總計: $${sumE}`;
            
            document.getElementById('list-o').innerHTML = (data.o || []).slice().reverse().map(i => `
                <div class="flex justify-between items-center bg-purple-500/10 p-2 rounded-lg">
                    <span class="text-[10px] font-black text-purple-500 uppercase tracking-widest">其他收入</span>
                    <div class="flex items-center gap-2">
                        <span class="font-bold text-sm text-purple-600 dark:text-purple-400">$${i.v}</span>
                        <button onclick="removeItem('o', ${i.id})" class="text-gray-400 px-1 ml-1">✕</button>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('list-e').innerHTML = (data.e || []).slice().reverse().map(i => `
                <div class="flex justify-between items-center bg-red-500/10 p-2 rounded-lg">
                    <span class="text-[10px] font-black text-red-500 uppercase tracking-widest">${i.c}</span>
                    <div class="flex items-center gap-2">
                        <span class="font-bold text-sm text-red-600 dark:text-red-400">$${i.v}</span>
                        <button onclick="removeItem('e', ${i.id})" class="text-gray-400 px-1 ml-1">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function refreshUI() {
            const data = db[currentDay];
            const sumO = data.o ? data.o.reduce((acc, i) => acc + i.v, 0) : 0;
            const sumE = data.e ? data.e.reduce((acc, i) => acc + i.v, 0) : 0;
            const totalIn = (data.u||0) + (data.a||0) + (data.d||0) + (data.t||0) + sumO;
            const net = Math.round(totalIn - sumE);
            
            const profitEl = document.getElementById('summary-profit');
            profitEl.innerText = `$${net.toLocaleString()}`;
            profitEl.className = `text-3xl font-black ${net < 0 ? 'text-red-500' : 'text-green-500'}`;
            updateChart();
        }

        function updateChart() {
            const now = new Date(currentDay);
            const dayIdx = (now.getDay() + 6) % 7;
            const start = new Date(now);
            start.setDate(now.getDate() - dayIdx);
            
            const area = document.getElementById('chart-area');
            const wrappers = area.querySelectorAll('.bar-wrapper');
            wrappers.forEach(w => w.remove());

            let wRev = 0, wExp = 0;

            for(let i=0; i<7; i++) {
                const date = new Date(start);
                date.setDate(start.getDate() + i);
                const k = date.toISOString().split('T')[0];
                const d = db[k] || { u:0, a:0, d:0, t:0, o:[], e:[] };
                
                const sumO = d.o ? d.o.reduce((a,b)=>a+b.v,0) : 0;
                const sumE = d.e ? d.e.reduce((a,b)=>a+b.v,0) : 0;
                const dailyIn = (d.u||0) + (d.a||0) + (d.d||0) + (d.t||0) + sumO;
                const net = dailyIn - sumE;
                
                wRev += dailyIn;
                wExp += sumE;

                const wrapper = document.createElement('div');
                wrapper.className = 'bar-wrapper';
                
                const label = document.createElement('div');
                label.className = 'bar-total-label';
                label.innerText = net !== 0 ? `$${Math.round(net)}` : "";
                wrapper.appendChild(label);

                const stack = document.createElement('div');
                stack.className = 'bar-stack';
                stack.style.height = `${Math.min((Math.max(0, net)/MAX_VAL)*100, 100)}%`;
                
                if (net > 0) {
                    const total = dailyIn;
                    const segments = [
                        { v: d.u||0, c: 'bg-uber' },
                        { v: d.a||0, c: 'bg-amap' },
                        { v: d.d||0, c: 'bg-didi' },
                        { v: d.t||0, c: 'bg-tada' },
                        { v: sumO, c: 'bg-other' }
                    ];
                    segments.forEach(seg => {
                        if (seg.v > 0) {
                            const part = document.createElement('div');
                            part.className = `w-full ${seg.c}`;
                            part.style.height = `${(seg.v / total) * 100}%`;
                            stack.appendChild(part);
                        }
                    });
                } else if (net < 0) {
                    stack.classList.add('bg-red-500');
                    stack.style.height = `${Math.min((Math.abs(net)/MAX_VAL)*100, 100)}%`;
                }

                if(k === currentDay) {
                    stack.style.boxShadow = '0 0 0 2px #0a84ff';
                }

                wrapper.appendChild(stack);
                area.appendChild(wrapper);
            }

            document.getElementById('week-total-revenue').innerText = `$${Math.round(wRev).toLocaleString()}`;
            document.getElementById('week-total-expense').innerText = `$${Math.round(wExp).toLocaleString()}`;
            document.getElementById('week-total-profit').innerText = `$${Math.round(wRev - wExp).toLocaleString()}`;
        }
    </script>
</body>
</html>
