<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>司機收入助手 V1.7.2</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-dim: #8e8e93;
            --border-color: #d1d1d6;
            --input-bg: #f2f2f7;
            --accent-blue: #0a84ff;
            
            /* 平台顏色定義 */
            --color-u: #2563eb; /* Uber - 藍 */
            --color-a: #60a5fa; /* 高德 - 淺藍 */
            --color-d: #fb923c; /* 滴滴 - 橙 */
            --color-t: #eab308; /* TADA - 黃 */
            --color-o: #a855f7; /* 其他 - 紫 */
        }

        .dark-mode {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --border-color: #3a3a3c;
            --input-bg: #2c2c2e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            overflow: hidden;
        }

        .swiper-container {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        .swiper-wrapper {
            display: flex;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            width: 200%;
        }

        .swiper-slide {
            width: 50%;
            flex-shrink: 0;
            padding: 20px;
        }

        .monthly-overview-slide {
            background-color: #ffffff !important;
            color: #000000 !important;
        }
        
        .dark-mode .monthly-overview-slide {
            background-color: #1c1c1e !important;
            color: #ffffff !important;
        }

        .dot-container {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 15px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--border-color);
            transition: all 0.3s;
        }

        .dot.active {
            background: var(--accent-blue);
            width: 16px;
            border-radius: 3px;
        }

        .chart-viewport {
            height: 140px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 6px;
            padding: 25px 5px 5px 5px;
            position: relative;
            border-bottom: 1px solid var(--border-color);
        }

        .bar-stack {
            width: 100%;
            display: flex;
            flex-direction: column-reverse;
            border-radius: 4px 4px 0 0;
            overflow: visible;
            background: rgba(128,128,128,0.1);
            position: relative;
        }

        /* 調整數值標籤位置，確保在 Bar 上方 */
        .bar-label {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            font-weight: 900;
            color: var(--text-main);
            white-space: nowrap;
            z-index: 10;
        }

        .pie-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 10px auto;
        }
        
        .pie-svg {
            transform: rotate(-90deg);
            border-radius: 50%;
        }

        .list-scroll {
            max-height: 120px; 
            overflow-y: auto;
        }

        input, select {
            background: var(--input-bg) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-main) !important;
            border-radius: 12px !important;
            padding: 10px !important;
            font-size: 16px !important;
        }

        .expense-row {
            display: flex;
            gap: 6px;
            align-items: center;
            width: 100%;
        }

        .platform-segment {
            width: 100%;
            transition: height 0.3s ease;
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto space-y-4 pb-24">
        
        <!-- Header -->
        <div class="flex justify-between items-start pt-4">
            <div>
                <h1 class="text-xl font-black italic">司機助手 <span class="text-[10px] not-italic opacity-30">V1.7.2</span></h1>
                <div class="relative mt-1">
                    <span id="date-label" class="text-blue-500 font-bold underline text-sm">選擇日期...</span>
                    <input type="date" id="date-picker" class="absolute inset-0 opacity-0 cursor-pointer">
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="manualToggleTheme()" class="p-2 rounded-xl bg-gray-200 dark:bg-white/10" id="theme-btn">🌙</button>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">今日純利</p>
                    <h2 id="summary-profit" class="text-3xl font-black text-green-500">$0</h2>
                </div>
            </div>
        </div>

        <!-- 數據輸入 -->
        <div class="glass-card p-5 space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[10px] font-bold text-blue-600 block mb-1">UBER</label>
                    <input type="number" id="val-u" class="w-full text-lg font-bold" placeholder="0" inputmode="decimal">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-blue-400 block mb-1">AMAP 高德</label>
                    <input type="number" id="val-a" class="w-full text-lg font-bold" placeholder="0" inputmode="decimal">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-orange-400 block mb-1">DIDI 滴滴</label>
                    <input type="number" id="val-d" class="w-full text-lg font-bold" placeholder="0" inputmode="decimal">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-yellow-500 block mb-1">TADA</label>
                    <input type="number" id="val-t" class="w-full text-lg font-bold" placeholder="0" inputmode="decimal">
                </div>
            </div>

            <div class="grid grid-cols-1 gap-4 pt-2">
                <div>
                    <div class="flex justify-between items-end mb-1">
                        <label class="text-[10px] font-bold text-purple-500 uppercase">其他收入</label>
                        <span id="total-other-label" class="text-[10px] font-black text-purple-500">$0</span>
                    </div>
                    <div class="flex gap-2">
                        <input type="number" id="other-val" class="flex-1 text-sm" placeholder="金額" inputmode="decimal">
                        <button onclick="addItem('o')" class="bg-purple-500 text-white px-4 rounded-xl font-bold">＋</button>
                    </div>
                    <div id="list-o" class="list-scroll mt-2 space-y-1"></div>
                </div>

                <div class="pt-2 border-t border-gray-100 dark:border-gray-800">
                    <div class="flex justify-between items-end mb-1">
                        <label class="text-[10px] font-bold text-red-500 uppercase">支出</label>
                        <span id="total-exp-label" class="text-[10px] font-black text-red-500">$0</span>
                    </div>
                    <div class="expense-row">
                        <select id="exp-cat" class="w-[100px] shrink-0 text-[11px] p-2">
                            <option>隧道</option>
                            <option>油/電</option>
                            <option>供車</option>
                            <option>抄牌</option>
                            <option>其他</option>
                        </select>
                        <input type="number" id="exp-val" class="flex-1 min-w-0 text-sm" placeholder="金額" inputmode="decimal">
                        <button onclick="addItem('e')" class="bg-red-500 text-white w-12 h-11 flex items-center justify-center rounded-xl font-bold shrink-0">＋</button>
                    </div>
                    <div id="list-e" class="list-scroll mt-2 space-y-1"></div>
                </div>
            </div>
        </div>

        <!-- 圖表分析 -->
        <div class="glass-card">
            <div class="swiper-container" id="swiper">
                <div class="swiper-wrapper" id="swiper-wrapper">
                    <div class="swiper-slide">
                        <h3 class="font-bold text-sm mb-4">本週純利分析</h3>
                        <div class="chart-viewport" id="chart-area"></div>
                        <div class="flex justify-between text-[10px] font-bold text-gray-400 mt-2 px-1 uppercase">
                            <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
                        </div>
                        
                        <!-- 平台顏色圖例 -->
                        <div class="flex flex-wrap justify-center gap-x-3 gap-y-1 mt-4 text-[9px] font-bold text-gray-400 uppercase">
                            <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full" style="background:var(--color-u)"></span>Uber</div>
                            <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full" style="background:var(--color-a)"></span>高德</div>
                            <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full" style="background:var(--color-d)"></span>滴滴</div>
                            <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full" style="background:var(--color-t)"></span>Tada</div>
                            <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full" style="background:var(--color-o)"></span>其他</div>
                        </div>

                        <div class="mt-4 grid grid-cols-2 gap-2">
                            <div class="bg-gray-50 dark:bg-white/5 p-2 rounded-xl">
                                <p class="text-[8px] font-bold text-gray-400">週總流水</p>
                                <p id="week-total-revenue" class="text-sm font-black">$0</p>
                            </div>
                            <div class="bg-gray-50 dark:bg-white/5 p-2 rounded-xl text-right">
                                <p class="text-[8px] font-bold text-gray-400">週總支出</p>
                                <p id="week-total-expense" class="text-sm font-black text-red-500">$0</p>
                            </div>
                        </div>
                    </div>

                    <div class="swiper-slide monthly-overview-slide">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="font-bold text-sm">本月概覽 (<span id="month-label">---</span>)</h3>
                        </div>
                        <div class="pie-container">
                            <svg class="pie-svg" width="140" height="140" viewBox="0 0 32 32" id="month-pie-chart"></svg>
                            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                                <div class="w-16 h-16 bg-white dark:bg-[#1c1c1e] rounded-full shadow-inner"></div>
                            </div>
                        </div>
                        <div class="text-center mt-2">
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">本月純利數據</p>
                            <h4 id="month-total-profit" class="text-4xl font-black text-blue-600 my-1">$0</h4>
                            <div class="flex justify-center gap-6 mt-3">
                                <div class="text-left">
                                    <p class="text-[8px] font-bold text-gray-400 uppercase">月總收入</p>
                                    <p id="month-rev-val" class="text-lg font-bold text-blue-500">$0</p>
                                </div>
                                <div class="text-right border-l border-gray-100 dark:border-gray-800 pl-6">
                                    <p class="text-[8px] font-bold text-gray-400 uppercase">月總支出</p>
                                    <p id="month-exp-val" class="text-lg font-bold text-red-500">$0</p>
                                </div>
                            </div>
                            <div id="week-legend" class="flex flex-wrap justify-center gap-x-3 gap-y-1 text-[9px] font-bold text-gray-400 mt-4"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="dot-container">
                <div class="dot active" id="dot-0" onclick="goToPage(0)"></div>
                <div class="dot" id="dot-1" onclick="goToPage(1)"></div>
            </div>
        </div>
    </div>

    <script>
        // 永久固定密鑰
        const STORAGE_KEY = 'DRIVER_APP_DATA_V1';
        let db = {};
        let currentDay = "";
        let isDarkMode = false;
        let currentPage = 0;

        window.onload = function() {
            // 數據讀取
            const saved = localStorage.getItem(STORAGE_KEY);
            if(saved) {
                try {
                    db = JSON.parse(saved);
                } catch(e) {
                    console.error("Data load error", e);
                    db = {};
                }
            }

            // 初始化日期
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            currentDay = `${year}-${month}-${day}`;
            
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                manualToggleTheme();
            }

            setupListeners();
            loadDay(currentDay);
        };

        function setupListeners() {
            const dp = document.getElementById('date-picker');
            dp.addEventListener('change', (e) => {
                loadDay(e.target.value);
            });

            ['val-u', 'val-a', 'val-d', 'val-t'].forEach(id => {
                document.getElementById(id).addEventListener('input', saveData);
            });
            
            let touchStartX = 0;
            const swiper = document.getElementById('swiper');
            swiper.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, {passive: true});
            swiper.addEventListener('touchend', e => {
                let touchEndX = e.changedTouches[0].screenX;
                if (touchStartX - touchEndX > 40) goToPage(1);
                if (touchEndX - touchStartX > 40) goToPage(0);
            }, {passive: true});
        }

        function manualToggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            document.getElementById('theme-btn').innerText = isDarkMode ? '☀️' : '🌙';
        }

        function goToPage(idx) {
            currentPage = idx;
            document.getElementById('swiper-wrapper').style.transform = `translateX(-${idx * 50}%)`;
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
        }

        function loadDay(dateStr) {
            if(!dateStr) return;
            currentDay = dateStr;
            document.getElementById('date-picker').value = dateStr;
            
            const dParts = dateStr.split('-');
            const d = new Date(dParts[0], dParts[1]-1, dParts[2]);
            document.getElementById('date-label').innerText = d.toLocaleDateString('zh-HK', { month:'short', day:'numeric', weekday:'short' });
            
            if(!db[currentDay]) db[currentDay] = { u:0, a:0, d:0, t:0, o:[], e:[] };
            const data = db[currentDay];
            
            document.getElementById('val-u').value = data.u || "";
            document.getElementById('val-a').value = data.a || "";
            document.getElementById('val-d').value = data.d || "";
            document.getElementById('val-t').value = data.t || "";
            
            renderLists();
            refreshUI();
        }

        function saveData() {
            if(!currentDay) return;
            if(!db[currentDay]) db[currentDay] = { u:0, a:0, d:0, t:0, o:[], e:[] };
            
            db[currentDay].u = parseFloat(document.getElementById('val-u').value) || 0;
            db[currentDay].a = parseFloat(document.getElementById('val-a').value) || 0;
            db[currentDay].d = parseFloat(document.getElementById('val-d').value) || 0;
            db[currentDay].t = parseFloat(document.getElementById('val-t').value) || 0;
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            refreshUI();
        }

        function addItem(type) {
            if(!db[currentDay]) db[currentDay] = { u:0, a:0, d:0, t:0, o:[], e:[] };
            const valInput = document.getElementById(type === 'o' ? 'other-val' : 'exp-val');
            const val = parseFloat(valInput.value);
            if(!val) return;

            if(type === 'o') {
                if(!db[currentDay].o) db[currentDay].o = [];
                db[currentDay].o.push({ v: val, id: Date.now() });
            } else {
                if(!db[currentDay].e) db[currentDay].e = [];
                const cat = document.getElementById('exp-cat').value;
                db[currentDay].e.push({ v: val, c: cat, id: Date.now() });
            }
            valInput.value = "";
            renderLists();
            saveData();
        }

        function removeItem(type, id) {
            if(db[currentDay] && db[currentDay][type]) {
                db[currentDay][type] = db[currentDay][type].filter(i => i.id !== id);
                renderLists();
                saveData();
            }
        }

        function renderLists() {
            const data = db[currentDay] || { o:[], e:[] };
            const sumO = (data.o || []).reduce((acc, i) => acc + i.v, 0);
            const sumE = (data.e || []).reduce((acc, i) => acc + i.v, 0);
            document.getElementById('total-other-label').innerText = `$${sumO}`;
            document.getElementById('total-exp-label').innerText = `$${sumE}`;
            
            document.getElementById('list-o').innerHTML = (data.o || []).slice().reverse().map(i => `
                <div class="flex justify-between items-center bg-purple-500/10 p-2 rounded-lg text-xs font-bold">
                    <span>其他收入</span>
                    <div class="flex items-center gap-2"><span>$${i.v}</span><button onclick="removeItem('o', ${i.id})">✕</button></div>
                </div>
            `).join('');
            
            document.getElementById('list-e').innerHTML = (data.e || []).slice().reverse().map(i => `
                <div class="flex justify-between items-center bg-red-500/10 p-2 rounded-lg text-xs font-bold">
                    <span>${i.c}</span>
                    <div class="flex items-center gap-2"><span>$${i.v}</span><button onclick="removeItem('e', ${i.id})">✕</button></div>
                </div>
            `).join('');
        }

        function refreshUI() {
            const data = db[currentDay] || { u:0, a:0, d:0, t:0, o:[], e:[] };
            const sumO = (data.o || []).reduce((acc, i) => acc + i.v, 0);
            const sumE = (data.e || []).reduce((acc, i) => acc + i.v, 0);
            const net = Math.round(((data.u||0) + (data.a||0) + (data.d||0) + (data.t||0) + sumO) - sumE);
            
            const pEl = document.getElementById('summary-profit');
            pEl.innerText = `$${net.toLocaleString()}`;
            pEl.className = `text-3xl font-black ${net < 0 ? 'text-red-500' : 'text-green-500'}`;
            
            updateCharts();
        }

        function updateCharts() {
            const nowParts = currentDay.split('-');
            const now = new Date(nowParts[0], nowParts[1]-1, nowParts[2]);
            const MAX_VAL = 4000;
            const dayIdx = (now.getDay() + 6) % 7;
            const startW = new Date(now);
            startW.setDate(now.getDate() - dayIdx);
            
            const area = document.getElementById('chart-area');
            area.innerHTML = '<div class="absolute left-0 right-0 border-t border-dashed border-gray-200 dark:border-gray-700 opacity-30" style="top:0"></div>';
            let wRev = 0, wExp = 0;

            for(let i=0; i<7; i++) {
                const date = new Date(startW);
                date.setDate(startW.getDate() + i);
                const k = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
                const d = db[k] || { u:0, a:0, d:0, t:0, o:[], e:[] };
                
                const sO = (d.o || []).reduce((a,b)=>a+b.v,0);
                const sE = (d.e || []).reduce((a,b)=>a+b.v,0);
                
                const uVal = d.u || 0;
                const aVal = d.a || 0;
                const dVal = d.d || 0;
                const tVal = d.t || 0;
                const rev = uVal + aVal + dVal + tVal + sO;
                const net = rev - sE;
                
                wRev += rev; wExp += sE;

                const wrapper = document.createElement('div');
                wrapper.className = 'flex-1 flex flex-col justify-end items-center h-full relative';
                
                const stack = document.createElement('div');
                stack.className = 'bar-stack w-full';
                stack.style.height = `${Math.min((Math.max(2, net)/MAX_VAL)*100, 100)}%`;
                
                // 添加各平台細分顏色 (只有當純利 > 0 時顯示比例)
                if (net > 0) {
                    const platforms = [
                        { v: uVal, c: 'var(--color-u)' },
                        { v: aVal, c: 'var(--color-a)' },
                        { v: dVal, c: 'var(--color-d)' },
                        { v: tVal, c: 'var(--color-t)' },
                        { v: sO, c: 'var(--color-o)' }
                    ];
                    
                    platforms.forEach(p => {
                        if (p.v > 0) {
                            const seg = document.createElement('div');
                            seg.className = 'platform-segment';
                            seg.style.height = `${(p.v / rev) * 100}%`;
                            seg.style.backgroundColor = p.c;
                            stack.appendChild(seg);
                        }
                    });

                    // 添加數值標籤 (柱頂)
                    const label = document.createElement('div');
                    label.className = 'bar-label';
                    label.innerText = Math.round(net);
                    stack.appendChild(label);
                }

                if(k === currentDay) stack.style.boxShadow = '0 0 0 2px #0a84ff';
                wrapper.appendChild(stack);
                area.appendChild(wrapper);
            }
            document.getElementById('week-total-revenue').innerText = `$${Math.round(wRev).toLocaleString()}`;
            document.getElementById('week-total-expense').innerText = `$${Math.round(wExp).toLocaleString()}`;

            // 月份更新邏輯
            const monthStr = `${nowParts[0]}-${nowParts[1]}`;
            document.getElementById('month-label').innerText = now.toLocaleDateString('zh-HK', { month: 'long' });
            
            let mRev = 0, mExp = 0;
            let weeklyRevenues = [0, 0, 0, 0, 0, 0];

            Object.keys(db).forEach(k => {
                if (k.startsWith(monthStr)) {
                    const d = db[k];
                    const dayRev = (d.u||0) + (d.a||0) + (d.d||0) + (d.t||0) + (d.o ? d.o.reduce((a,b)=>a+b.v,0) : 0);
                    mRev += dayRev;
                    mExp += (d.e ? d.e.reduce((a,b)=>a+b.v,0) : 0);
                    
                    const date = new Date(k);
                    const firstDay = new Date(nowParts[0], nowParts[1]-1, 1);
                    const startOffset = (firstDay.getDay() + 6) % 7; 
                    const weekIdx = Math.floor((date.getDate() + startOffset - 1) / 7);
                    if(weeklyRevenues[weekIdx] !== undefined) weeklyRevenues[weekIdx] += dayRev;
                }
            });

            document.getElementById('month-total-profit').innerText = `$${Math.round(mRev - mExp).toLocaleString()}`;
            document.getElementById('month-rev-val').innerText = `$${Math.round(mRev).toLocaleString()}`;
            document.getElementById('month-exp-val').innerText = `$${Math.round(mExp).toLocaleString()}`;

            const pieSvg = document.getElementById('month-pie-chart');
            const legend = document.getElementById('week-legend');
            pieSvg.innerHTML = ""; legend.innerHTML = "";
            const colors = ['#1e40af', '#2563eb', '#3b82f6', '#60a5fa', '#93c5fd', '#dbeafe'];
            let acc = 0;
            weeklyRevenues.forEach((rev, idx) => {
                if (mRev === 0 || rev <= 0) return;
                const p = (rev / mRev) * 100;
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("r", "16"); circle.setAttribute("cx", "16"); circle.setAttribute("cy", "16");
                circle.setAttribute("fill", "transparent");
                circle.setAttribute("stroke", colors[idx]);
                circle.setAttribute("stroke-width", "32");
                circle.setAttribute("stroke-dasharray", `${p} 100`);
                circle.setAttribute("stroke-dashoffset", `-${acc}`);
                pieSvg.appendChild(circle);
                legend.innerHTML += `<div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full" style="background:${colors[idx]}"></span>第${idx+1}週</div>`;
                acc += p;
            });
            if(mRev === 0) pieSvg.innerHTML = `<circle r="16" cx="16" cy="16" fill="transparent" stroke="#f3f4f6" stroke-width="32" stroke-dasharray="100 100" />`;
        }
    </script>
</body>
</html>
