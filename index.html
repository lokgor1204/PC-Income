<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="司機助手">
    <title>司機收入助手 (防遺失數據版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
        }
        .app-container {
            padding-top: calc(var(--safe-top) + 20px);
            padding-bottom: calc(var(--safe-bottom) + 40px);
        }
        input, select {
            background: #1c1c1e !important;
            border: 1px solid #2c2c2e !important;
            color: white !important;
            -webkit-appearance: none;
            min-width: 0;
        }
        input:focus, select:focus {
            border-color: #0a84ff !important;
            outline: none;
        }
        .platform-tag {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            display: block;
            height: 15px;
        }
        .glass-card {
            background: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .active-press:active {
            transform: scale(0.97);
            transition: transform 0.1s;
        }
        .bar-container {
            height: 180px;
            display: flex;
            align-items: flex-end;
            gap: 6px;
            padding: 40px 0 10px 0;
        }
        .bar-segment {
            transition: height 0.3s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        #date-input {
            position: absolute;
            opacity: 0;
            width: 100%;
            left: 0; top: 0; height: 100%;
            cursor: pointer;
        }
        #autosave-indicator {
            font-size: 10px;
            color: #4ade80;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .bar-label-top {
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: 900;
            color: #ffffff;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #2c2c2e;
            border-radius: 10px;
        }
    </style>
</head>
<body class="px-4 overflow-x-hidden">
    <div class="app-container max-w-md mx-auto space-y-6">
        <!-- 標頭 -->
        <header class="flex justify-between items-end mb-2">
            <div class="relative">
                <h1 class="text-3xl font-black tracking-tight text-white flex items-center gap-2">
                    司機助手
                    <span id="autosave-indicator">● 已同步</span>
                </h1>
                <div class="relative inline-block mt-1">
                    <p id="display-date-text" class="text-blue-500 font-bold flex items-center gap-1 underline decoration-dotted underline-offset-4 cursor-pointer">
                        載入中... 📅
                    </p>
                    <input type="date" id="date-input">
                </div>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-gray-600 block uppercase font-bold tracking-widest">當日純利</span>
                <span id="top-profit" class="text-xl font-bold text-green-500">$0</span>
            </div>
        </header>

        <!-- 數據輸入 -->
        <section class="glass-card rounded-3xl p-5 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-bold text-gray-400 flex items-center">
                    <span class="w-1.5 h-1.5 bg-blue-500 rounded-full mr-2"></span> 收入流水
                </h2>
            </div>
            
            <div class="grid grid-cols-2 gap-x-4 gap-y-3">
                <!-- UBER (藍色) -->
                <div>
                    <span class="platform-tag text-blue-500">UBER</span>
                    <input type="number" id="in-uber" inputmode="decimal" placeholder="0" class="w-full rounded-xl py-3 px-3 text-lg font-bold border-blue-500/20">
                </div>
                <!-- AMAP (橙色) -->
                <div>
                    <span class="platform-tag text-orange-500">高德 (AMAP)</span>
                    <input type="number" id="in-amap" inputmode="decimal" placeholder="0" class="w-full rounded-xl py-3 px-3 text-lg font-bold border-orange-500/20">
                </div>
                <!-- DIDI (黃色) -->
                <div>
                    <span class="platform-tag text-yellow-400">滴滴 (DIDI)</span>
                    <input type="number" id="in-didi" inputmode="decimal" placeholder="0" class="w-full rounded-xl py-3 px-3 text-lg font-bold border-yellow-400/20">
                </div>
                <!-- TADA (綠色) -->
                <div>
                    <span class="platform-tag text-green-500">TADA</span>
                    <input type="number" id="in-tada" inputmode="decimal" placeholder="0" class="w-full rounded-xl py-3 px-3 text-lg font-bold border-green-500/20">
                </div>
                
                <!-- 其他收入 (紫色) -->
                <div class="col-span-2 mt-2">
                    <span class="platform-tag text-purple-400 uppercase">其他收入</span>
                    <div class="relative flex">
                        <input type="number" id="new-inc-val" inputmode="decimal" placeholder="0" class="w-full rounded-xl py-3 pl-3 pr-12 text-lg font-bold border-purple-500/30">
                        <button onclick="addItem('income')" class="absolute right-1 top-1 bottom-1 bg-purple-600 hover:bg-purple-500 text-white w-10 rounded-lg font-black active-press text-lg">＋</button>
                    </div>
                </div>
            </div>

            <!-- 其他收入列表 -->
            <div id="income-list" class="mt-3 space-y-1 max-h-24 overflow-y-auto pr-1"></div>

            <!-- 總流水 -->
            <div class="flex items-center justify-between bg-blue-500/10 border border-blue-500/20 rounded-2xl p-4 mt-6 mb-6">
                <span class="text-blue-400 font-bold text-xs uppercase tracking-tighter">當日總流水</span>
                <span class="text-lg font-black text-blue-500">$<span id="display-total-revenue">0</span></span>
            </div>

            <!-- 支出區 -->
            <div class="mt-2 border-t border-white/5 pt-6">
                <h2 class="text-sm font-bold text-gray-400 mb-4 flex items-center">
                    <span class="w-1.5 h-1.5 bg-red-500 rounded-full mr-2"></span> 支出紀錄
                </h2>
                
                <div class="flex flex-col gap-2 mb-4">
                    <div class="flex gap-2">
                        <select id="new-exp-cat" class="w-1/3 rounded-xl py-2 px-2 text-xs font-bold bg-[#1c1c1e]">
                            <option value="隧道">隧道</option>
                            <option value="電費/油費">電費/油費</option>
                            <option value="供車">供車</option>
                            <option value="抄牌">抄牌</option>
                            <option value="其他">其他</option>
                        </select>
                        <div class="relative flex flex-1">
                            <input type="number" id="new-exp-val" inputmode="decimal" placeholder="0" class="w-full rounded-xl py-2 pl-3 pr-12 text-sm font-bold border-red-500/30">
                            <button onclick="addItem('expense')" class="absolute right-1 top-1 bottom-1 bg-red-600 hover:bg-red-500 text-white w-10 rounded-lg font-black active-press text-lg">＋</button>
                        </div>
                    </div>
                </div>
                
                <div id="expense-list" class="space-y-2 mb-4 max-h-48 overflow-y-auto pr-1"></div>

                <div class="flex items-center justify-between bg-red-500/10 border border-red-500/20 rounded-2xl p-4">
                    <span class="text-red-400 font-bold text-xs uppercase tracking-tighter">當日總支出</span>
                    <span class="text-lg font-black text-red-500">$<span id="display-total-exp">0</span></span>
                </div>
            </div>
        </section>

        <!-- 圖表分析 -->
        <section class="glass-card rounded-3xl p-5 shadow-xl">
            <div class="flex justify-between items-center mb-1">
                <h2 class="font-bold text-lg text-white">本週統計分析</h2>
                <button onclick="clearAll()" class="text-[9px] text-gray-600 border border-gray-800 px-2 py-1 rounded-lg">清空紀錄</button>
            </div>

            <div id="chart-container" class="bar-container border-b border-white/10"></div>
            <div class="flex justify-between mt-2 mb-4 text-[10px] text-gray-500 font-bold text-center uppercase">
                <span class="flex-1">一</span><span class="flex-1">二</span><span class="flex-1">三</span><span class="flex-1">四</span><span class="flex-1">五</span><span class="flex-1">六</span><span class="flex-1">日</span>
            </div>
            
            <div id="stats-content"></div>
        </section>
    </div>

    <script>
        // 設定目前的存儲 Key
        const MASTER_KEY = 'DRIVER_APP_V8_STORAGE';
        // 可能存在舊數據的 Key 列表
        const OLD_KEYS = [
            'DRIVER_APP_V7_STORAGE',
            'DRIVER_APP_V6_STORAGE',
            'DRIVER_APP_V5_STORAGE',
            'DRIVER_APP_V4_STORAGE',
            'driver_records',
            'ridehail_tracker_v2'
        ];
        
        let db = {};
        let currentDayExpenses = [];
        let currentDayOtherIncome = [];
        let selectedDate = "";
        let saveTimer;

        function initData() {
            // 1. 嘗試讀取當前版本的數據
            const masterData = localStorage.getItem(MASTER_KEY);
            if (masterData) {
                db = JSON.parse(masterData);
            } else {
                // 2. 如果當前版本沒數據，嘗試自動遷移舊數據
                console.log("Checking for old data...");
                for (const oldKey of OLD_KEYS) {
                    const oldData = localStorage.getItem(oldKey);
                    if (oldData) {
                        try {
                            const parsed = JSON.parse(oldData);
                            // 簡單合併或覆蓋
                            db = Object.assign(db, parsed);
                            console.log(`Migrated data from ${oldKey}`);
                        } catch (e) {
                            console.error(`Failed to parse ${oldKey}`);
                        }
                    }
                }
                // 遷移後立即存儲到新 Key，避免下次再遷移
                saveToDisk();
            }
        }

        function saveToDisk() {
            localStorage.setItem(MASTER_KEY, JSON.stringify(db));
        }

        function getTodayStr() {
            const now = new Date();
            const offset = now.getTimezoneOffset() * 60000;
            return new Date(now - offset).toISOString().split('T')[0];
        }

        function loadDateData(dateStr) {
            selectedDate = dateStr;
            document.getElementById('date-input').value = dateStr;
            const d = new Date(dateStr);
            document.getElementById('display-date-text').innerText = d.toLocaleDateString('zh-HK', { month: 'long', day: 'numeric', weekday: 'short' }) + " 📅";
            
            const data = db[dateStr] || { u: 0, a: 0, d: 0, t: 0, e_list: [], i_list: [] };
            
            // 處理不同版本的數據格式 (例如舊版可能是 uber/amap 全稱)
            document.getElementById('in-uber').value = data.u || data.uber || "";
            document.getElementById('in-amap').value = data.a || data.amap || "";
            document.getElementById('in-didi').value = data.d || data.didi || "";
            document.getElementById('in-tada').value = data.t || data.tada || "";
            
            currentDayExpenses = data.e_list || (data.expense ? [{cat: '總支出', val: data.expense}] : []);
            currentDayOtherIncome = data.i_list || [];
            
            renderList('income');
            renderList('expense');
            updateUI();
        }

        function updateUI() {
            const u = parseFloat(document.getElementById('in-uber').value) || 0;
            const a = parseFloat(document.getElementById('in-amap').value) || 0;
            const d = parseFloat(document.getElementById('in-didi').value) || 0;
            const t = parseFloat(document.getElementById('in-tada').value) || 0;
            
            const otherIn = currentDayOtherIncome.reduce((s, v) => s + v.val, 0);
            const totalE = currentDayExpenses.reduce((s, v) => s + v.val, 0);
            const totalIn = u + a + d + t + otherIn;
            const profit = totalIn - totalE;

            document.getElementById('top-profit').innerText = `$${Math.round(profit).toLocaleString()}`;
            document.getElementById('display-total-revenue').innerText = totalIn.toLocaleString();
            document.getElementById('display-total-exp').innerText = totalE.toLocaleString();

            db[selectedDate] = { u, a, d, t, e_list: [...currentDayExpenses], i_list: [...currentDayOtherIncome], e_total: totalE, i_total: totalIn };
            saveToDisk();

            const ind = document.getElementById('autosave-indicator');
            ind.style.opacity = "1";
            clearTimeout(saveTimer);
            saveTimer = setTimeout(() => ind.style.opacity = "0", 1200);

            refreshCharts(totalIn, totalE);
        }

        function addItem(type) {
            const valInput = document.getElementById(type === 'income' ? 'new-inc-val' : 'new-exp-val');
            const val = parseFloat(valInput.value);
            
            if (!isNaN(val) && val > 0) {
                if (type === 'income') {
                    currentDayOtherIncome.push({ cat: '其他', val });
                } else {
                    const catInput = document.getElementById('new-exp-cat');
                    currentDayExpenses.push({ cat: catInput.value, val });
                }
                valInput.value = "";
                renderList(type);
                updateUI();
            }
        }

        function removeItem(type, idx) {
            if (type === 'income') currentDayOtherIncome.splice(idx, 1);
            else currentDayExpenses.splice(idx, 1);
            renderList(type);
            updateUI();
        }

        function renderList(type) {
            const list = type === 'income' ? currentDayOtherIncome : currentDayExpenses;
            const el = document.getElementById(type === 'income' ? 'income-list' : 'expense-list');
            const colorClass = type === 'income' ? 'purple' : 'red';
            
            if (list.length === 0) {
                el.innerHTML = type === 'income' ? '' : `<p class="text-gray-600 italic py-1 text-[10px]">無支出紀錄</p>`;
                return;
            }
            
            el.innerHTML = list.map((item, i) => `
                <div class="flex justify-between items-center bg-white/5 p-2 rounded-xl mb-1 border border-white/5">
                    <div class="flex items-center gap-2">
                        <span class="bg-${colorClass}-500/20 text-${colorClass}-400 px-1.5 py-0.5 rounded text-[10px] font-black uppercase tracking-wider">${item.cat}</span>
                        <span class="font-bold text-sm text-gray-200">$${item.val.toLocaleString()}</span>
                    </div>
                    <button onclick="removeItem('${type}', ${i})" class="bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white w-7 h-7 flex items-center justify-center rounded-lg text-lg font-black active-press">
                        －
                    </button>
                </div>
            `).join('');
        }

        function getWeekKeys(base) {
            const now = new Date(base);
            const day = now.getDay();
            const diff = now.getDate() - (day === 0 ? 6 : day - 1);
            const start = new Date(now.setDate(diff));
            const keys = [];
            for (let i = 0; i < 7; i++) {
                const t = new Date(start);
                t.setDate(start.getDate() + i);
                keys.push(t.toISOString().split('T')[0]);
            }
            return keys;
        }

        function refreshCharts(currIn, currE) {
            const week = getWeekKeys(selectedDate);
            let totals = [];
            let maxVal = 500;
            let weekData = { in: 0, out: 0 };

            week.forEach(k => {
                let day = (k === selectedDate) ? { i_total: currIn, e_total: currE } : (db[k] || { i_total: 0, e_total: 0 });
                const sum = day.i_total || 0;
                totals.push({ key: k, sum });
                if (sum > maxVal) maxVal = sum;
                weekData.in += sum;
                weekData.out += (day.e_total || 0);
            });

            const container = document.getElementById('chart-container');
            container.innerHTML = totals.map(day => {
                const h = day.sum > 0 ? (day.sum / maxVal * 100) : 0;
                const isSel = day.key === selectedDate;
                return `
                    <div class="flex-1 flex flex-col justify-end gap-1 relative h-full ${isSel ? 'bg-white/5 rounded-t-lg' : ''}">
                        <span class="bar-label-top ${isSel ? 'text-blue-400 font-black' : 'text-gray-600'}">${day.sum > 0 ? Math.round(day.sum) : ''}</span>
                        <div class="w-full bg-blue-500 bar-segment rounded-t-sm" style="height: ${h}%"></div>
                    </div>
                `;
            }).join('');

            document.getElementById('stats-content').innerHTML = `
                <div class="bg-white/5 p-4 rounded-2xl border border-white/10 mt-2">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs font-bold text-gray-500 tracking-widest uppercase">本週累計純利</span>
                        <span class="text-xl font-black text-green-500">$${(weekData.in - weekData.out).toLocaleString()}</span>
                    </div>
                    <div class="flex justify-between text-[9px] text-gray-600 font-bold uppercase">
                        <span>總流水: $${weekData.in.toLocaleString()}</span>
                        <span>總支出: $${weekData.out.toLocaleString()}</span>
                    </div>
                </div>
            `;
        }

        function clearAll() {
            if (confirm("這將刪除所有歷史紀錄，確定嗎？")) {
                db = {};
                saveToDisk();
                loadDateData(selectedDate);
            }
        }

        document.getElementById('date-input').addEventListener('change', (e) => loadDateData(e.target.value));
        ['in-uber', 'in-amap', 'in-didi', 'in-tada'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateUI);
        });

        window.onload = () => {
            initData();
            loadDateData(getTodayStr());
        };
    </script>
</body>
</html>
