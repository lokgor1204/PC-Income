<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>司機收入助手 V1.6.4</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-dim: #8e8e93;
            --border-color: #d1d1d6;
            --input-bg: #f2f2f7;
            --accent-blue: #0a84ff;
        }

        .dark-mode {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --border-color: #3a3a3c;
            --input-bg: #2c2c2e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            transition: background-color 0.3s, color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            transition: background-color 0.3s;
        }

        input, select {
            background: var(--input-bg) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-main) !important;
            border-radius: 12px !important;
            padding: 10px !important;
            outline: none;
        }

        /* 圖表樣式 */
        .chart-viewport {
            height: 200px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 6px;
            padding: 30px 5px 10px 5px;
            position: relative;
            border-bottom: 1px solid var(--border-color);
        }

        .y-guide {
            position: absolute;
            left: 0;
            right: 0;
            border-top: 1px dashed var(--border-color);
            opacity: 0.3;
            pointer-events: none;
        }

        .bar-wrapper {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            position: relative;
        }

        .bar-total-label {
            position: absolute;
            top: -20px;
            font-size: 9px;
            font-weight: 900;
            color: var(--text-main);
            white-space: nowrap;
        }

        .bar-stack {
            width: 100%;
            display: flex;
            flex-direction: column-reverse;
            border-radius: 6px 6px 0 0;
            overflow: hidden;
            background: rgba(128,128,128,0.1);
            transition: height 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            min-height: 4px;
        }

        .bar-seg {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: white;
            font-weight: bold;
            overflow: hidden;
        }

        /* 滾動列表樣式 */
        .list-scroll {
            max-height: 85px; 
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .theme-toggle {
            padding: 6px 10px;
            border-radius: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            font-size: 16px;
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto space-y-4 pb-24">
        
        <!-- Header -->
        <div class="flex justify-between items-start pt-4">
            <div>
                <h1 class="text-xl font-black italic">司機助手 <span class="text-[10px] not-italic opacity-30">V1.6.4</span></h1>
                <div class="relative mt-1">
                    <span id="date-label" class="text-blue-500 font-bold underline">選擇日期...</span>
                    <input type="date" id="date-picker" class="absolute inset-0 opacity-0 cursor-pointer">
                </div>
            </div>
            <div class="flex items-center gap-3">
                <!-- 固定位置的深淺色切換鈕 -->
                <button onclick="manualToggleTheme()" class="theme-toggle" id="theme-btn">🌓</button>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">今日純利</p>
                    <h2 id="summary-profit" class="text-3xl font-black text-green-500">$0</h2>
                </div>
            </div>
        </div>

        <!-- 核心輸入區 -->
        <div class="glass-card p-5 space-y-4">
            <!-- 平台流水 -->
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 block mb-1 uppercase">UBER</label>
                    <input type="number" id="val-u" class="w-full text-lg font-bold" placeholder="0" inputmode="decimal">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-blue-400 block mb-1 uppercase">AMAP 高德</label>
                    <input type="number" id="val-a" class="w-full text-lg font-bold" placeholder="0" inputmode="decimal">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-orange-400 block mb-1 uppercase">DIDI 滴滴</label>
                    <input type="number" id="val-d" class="w-full text-lg font-bold" placeholder="0" inputmode="decimal">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-yellow-500 block mb-1 uppercase">TADA</label>
                    <input type="number" id="val-t" class="w-full text-lg font-bold" placeholder="0" inputmode="decimal">
                </div>
            </div>

            <!-- 其他收入區 - 字體放大 -->
            <div class="pt-4 border-t border-gray-100 dark:border-gray-800">
                <div class="flex justify-between items-end mb-2">
                    <label class="text-[10px] font-bold text-purple-500 uppercase">其他收入</label>
                    <span id="total-other-label" class="text-lg font-black text-purple-600 dark:text-purple-400">總其他收入: $0</span>
                </div>
                <div class="flex gap-2">
                    <input type="number" id="other-val" class="flex-1" placeholder="金額" inputmode="decimal">
                    <button onclick="addItem('o')" class="bg-purple-500 text-white px-5 rounded-xl font-bold active:opacity-70">＋</button>
                </div>
                <div id="list-o" class="list-scroll mt-2 space-y-1"></div>
            </div>

            <!-- 支出區 - 字體放大 -->
            <div class="pt-4 border-t border-gray-100 dark:border-gray-800">
                <div class="flex justify-between items-end mb-2">
                    <label class="text-[10px] font-bold text-red-500 uppercase">支出</label>
                    <span id="total-exp-label" class="text-lg font-black text-red-600 dark:text-red-400">總支出: $0</span>
                </div>
                <div class="flex gap-2">
                    <select id="exp-cat" class="w-24">
                        <option>隧道</option>
                        <option>油/電</option>
                        <option>供車</option>
                        <option>抄牌</option>
                        <option>其他</option>
                    </select>
                    <input type="number" id="exp-val" class="flex-1" placeholder="金額" inputmode="decimal">
                    <button onclick="addItem('e')" class="bg-red-500 text-white px-5 rounded-xl font-bold active:opacity-70">＋</button>
                </div>
                <div id="list-e" class="list-scroll mt-2 space-y-1"></div>
            </div>
        </div>

        <!-- 圖表 -->
        <div class="glass-card p-5">
            <h3 class="font-bold mb-2">本週純利趨勢</h3>
            <div class="chart-viewport" id="chart-area">
                <div class="y-guide" style="top: 0;"></div>
                <div class="absolute right-0 top-[-8px] text-[8px] text-gray-400 font-bold">MAX $4,000</div>
                <div class="y-guide" style="top: 50%;"></div>
            </div>
            <div class="flex justify-between text-[10px] font-bold text-gray-400 mt-2 px-1">
                <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
            </div>
        </div>
    </div>

    <script>
        // 【關鍵】使用通用 Key 名稱，確保版本更新時數據不丟失
        const STORAGE_KEY = 'DRIVER_APP_DATA_PERSISTENT'; 
        const THEME_KEY = 'DRIVER_APP_THEME_PERSISTENT';
        const MAX_VAL = 4000;
        
        // 嘗試從多個舊版本 Key 遷移數據（平滑過渡）
        function migrateData() {
            const oldKeys = ['DRIVER_DATA_150', 'DRIVER_DATA_V1'];
            let combinedData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            
            oldKeys.forEach(oldKey => {
                const oldData = localStorage.getItem(oldKey);
                if (oldData) {
                    const parsed = JSON.parse(oldData);
                    combinedData = { ...parsed, ...combinedData };
                    // 遷移後可選擇刪除舊 Key 或保留
                }
            });
            return combinedData;
        }

        let db = migrateData();
        let currentDay = "";
        let isDarkMode = false;

        window.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            const offset = now.getTimezoneOffset() * 60000;
            currentDay = new Date(now.getTime() - offset).toISOString().split('T')[0];
            
            initTheme();
            setupListeners();
            loadDay(currentDay);
        });

        function setupListeners() {
            document.getElementById('date-picker').onchange = (e) => loadDay(e.target.value);
            ['val-u', 'val-a', 'val-d', 'val-t'].forEach(id => {
                document.getElementById(id).oninput = saveData;
            });
        }

        function initTheme() {
            const savedTheme = localStorage.getItem(THEME_KEY);
            isDarkMode = savedTheme === 'dark';
            applyTheme();
        }

        function manualToggleTheme() {
            isDarkMode = !isDarkMode;
            localStorage.setItem(THEME_KEY, isDarkMode ? 'dark' : 'light');
            applyTheme();
        }

        function applyTheme() {
            document.body.classList.toggle('dark-mode', isDarkMode);
            document.getElementById('theme-btn').innerText = isDarkMode ? '☀️' : '🌙';
            updateChart();
        }

        function loadDay(dateStr) {
            currentDay = dateStr;
            document.getElementById('date-picker').value = dateStr;
            const d = new Date(dateStr);
            document.getElementById('date-label').innerText = d.toLocaleDateString('zh-HK', { month:'short', day:'numeric', weekday:'short' });

            if(!db[currentDay]) db[currentDay] = { u:0, a:0, d:0, t:0, o:[], e:[] };
            const data = db[currentDay];
            
            document.getElementById('val-u').value = data.u || "";
            document.getElementById('val-a').value = data.a || "";
            document.getElementById('val-d').value = data.d || "";
            document.getElementById('val-t').value = data.t || "";
            
            renderLists();
            refreshUI();
        }

        function saveData() {
            if(!db[currentDay]) db[currentDay] = { u:0, a:0, d:0, t:0, o:[], e:[] };
            db[currentDay].u = parseFloat(document.getElementById('val-u').value) || 0;
            db[currentDay].a = parseFloat(document.getElementById('val-a').value) || 0;
            db[currentDay].d = parseFloat(document.getElementById('val-d').value) || 0;
            db[currentDay].t = parseFloat(document.getElementById('val-t').value) || 0;
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            refreshUI();
        }

        function addItem(type) {
            const valInput = document.getElementById(type === 'o' ? 'other-val' : 'exp-val');
            const val = parseFloat(valInput.value);
            if(!val) return;

            if(type === 'o') {
                db[currentDay].o.push({ v: val, id: Date.now() });
            } else {
                const cat = document.getElementById('exp-cat').value;
                db[currentDay].e.push({ v: val, c: cat, id: Date.now() });
            }
            valInput.value = "";
            renderLists();
            saveData();
        }

        function removeItem(type, id) {
            db[currentDay][type] = db[currentDay][type].filter(item => item.id !== id);
            renderLists();
            saveData();
        }

        function renderLists() {
            const data = db[currentDay];
            const sumO = data.o ? data.o.reduce((acc, i) => acc + i.v, 0) : 0;
            const sumE = data.e ? data.e.reduce((acc, i) => acc + i.v, 0) : 0;

            document.getElementById('total-other-label').innerText = `總其他收入: $${sumO}`;
            document.getElementById('total-exp-label').innerText = `總支出: $${sumE}`;

            document.getElementById('list-o').innerHTML = data.o.slice().reverse().map(i => `
                <div class="flex justify-between items-center bg-purple-500/10 p-2 rounded-lg">
                    <span class="text-[10px] font-bold text-purple-500">其他收入</span>
                    <div class="flex items-center gap-2">
                        <span class="font-bold">$${i.v}</span>
                        <button onclick="removeItem('o', ${i.id})" class="text-gray-400 px-1">✕</button>
                    </div>
                </div>
            `).join('');

            document.getElementById('list-e').innerHTML = data.e.slice().reverse().map(i => `
                <div class="flex justify-between items-center bg-red-500/10 p-2 rounded-lg">
                    <span class="text-[10px] font-bold text-red-400">${i.c}</span>
                    <div class="flex items-center gap-2">
                        <span class="font-bold text-red-500">$${i.v}</span>
                        <button onclick="removeItem('e', ${i.id})" class="text-gray-400 px-1">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function refreshUI() {
            const data = db[currentDay];
            const sumO = data.o ? data.o.reduce((acc, i) => acc + i.v, 0) : 0;
            const sumE = data.e ? data.e.reduce((acc, i) => acc + i.v, 0) : 0;
            const totalIn = (data.u||0) + (data.a||0) + (data.d||0) + (data.t||0) + sumO;
            const net = Math.round(totalIn - sumE);
            
            const profitEl = document.getElementById('summary-profit');
            profitEl.innerText = `$${net.toLocaleString()}`;
            profitEl.className = `text-3xl font-black ${net < 0 ? 'text-red-500' : 'text-green-500'}`;
            updateChart();
        }

        function updateChart() {
            const now = new Date(currentDay);
            const dayIdx = (now.getDay() + 6) % 7;
            const start = new Date(now);
            start.setDate(now.getDate() - dayIdx);

            const area = document.getElementById('chart-area');
            const wrappers = area.querySelectorAll('.bar-wrapper');
            wrappers.forEach(w => w.remove());

            for(let i=0; i<7; i++) {
                const date = new Date(start);
                date.setDate(start.getDate() + i);
                const k = date.toISOString().split('T')[0];
                const d = db[k] || { u:0, a:0, d:0, t:0, o:[], e:[] };
                
                const totalIn = (d.u||0) + (d.a||0) + (d.d||0) + (d.t||0) + (d.o?d.o.reduce((a,b)=>a+b.v,0):0);
                const net = totalIn - (d.e?d.e.reduce((a,b)=>a+b.v,0):0);

                const wrapper = document.createElement('div');
                wrapper.className = 'bar-wrapper';

                const label = document.createElement('div');
                label.className = 'bar-total-label';
                label.innerText = `$${Math.round(net)}`;
                wrapper.appendChild(label);
                
                const stack = document.createElement('div');
                stack.className = 'bar-stack';
                stack.style.height = `${Math.min((Math.max(0, net)/MAX_VAL)*100, 100)}%`;
                
                if(k === currentDay) stack.style.border = '2px solid #0a84ff';
                if(net < 0) stack.style.backgroundColor = '#ef4444';

                wrapper.appendChild(stack);
                area.appendChild(wrapper);
            }
        }
    </script>
</body>
</html>
