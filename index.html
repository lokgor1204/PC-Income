<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="司機助手">
    <title>司機收入助手 (自動跨日版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
        }
        .app-container {
            padding-top: calc(var(--safe-top) + 20px);
            padding-bottom: calc(var(--safe-bottom) + 40px);
        }
        input {
            background: #1c1c1e !important;
            border: 1px solid #2c2c2e !important;
            color: white !important;
            -webkit-appearance: none;
            min-width: 0;
        }
        input:focus {
            border-color: #0a84ff !important;
            outline: none;
        }
        .platform-tag {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            display: block;
        }
        .glass-card {
            background: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .active-press:active {
            transform: scale(0.97);
            transition: transform 0.1s;
        }
        .bar-container {
            height: 180px;
            display: flex;
            align-items: flex-end;
            gap: 6px;
            padding: 40px 0 10px 0;
        }
        .bar-segment {
            transition: height 0.3s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .inner-label {
            font-size: 7px;
            font-weight: 900;
            color: rgba(0, 0, 0, 0.6);
            white-space: nowrap;
        }
        #date-input {
            position: absolute;
            opacity: 0;
            width: 100%;
            left: 0; top: 0; height: 100%;
            cursor: pointer;
        }
        #autosave-indicator {
            font-size: 10px;
            color: #4ade80;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .bar-label-top {
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: 900;
            color: #ffffff;
        }
        .legend-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }
    </style>
</head>
<body class="px-4 overflow-x-hidden">
    <div class="app-container max-w-md mx-auto space-y-6">
        <!-- 標頭 -->
        <header class="flex justify-between items-end mb-2">
            <div class="relative">
                <h1 class="text-3xl font-black tracking-tight text-white flex items-center gap-2">
                    收入助手
                    <span id="autosave-indicator">● 已同步</span>
                </h1>
                <div class="relative inline-block mt-1">
                    <p id="display-date-text" class="text-blue-500 font-bold flex items-center gap-1 underline decoration-dotted underline-offset-4">
                        載入中... 📅
                    </p>
                    <input type="date" id="date-input">
                </div>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-gray-600 block uppercase font-bold tracking-widest">當日盈利</span>
                <span id="top-profit" class="text-xl font-bold text-green-500">$0</span>
            </div>
        </header>

        <!-- 數據輸入 -->
        <section class="glass-card rounded-3xl p-5 shadow-2xl">
            <h2 class="text-sm font-bold text-gray-400 mb-4 flex items-center">
                <span class="w-1.5 h-1.5 bg-blue-500 rounded-full mr-2"></span> 平台流水
            </h2>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <span class="platform-tag text-blue-400">UBER</span>
                    <input type="number" id="in-uber" inputmode="decimal" placeholder="0" class="w-full rounded-2xl py-3 px-4 text-lg font-bold">
                </div>
                <div>
                    <span class="platform-tag text-orange-400">高德 (AMAP)</span>
                    <input type="number" id="in-amap" inputmode="decimal" placeholder="0" class="w-full rounded-2xl py-3 px-4 text-lg font-bold">
                </div>
                <div>
                    <span class="platform-tag text-yellow-400">滴滴 (DIDI)</span>
                    <input type="number" id="in-didi" inputmode="decimal" placeholder="0" class="w-full rounded-2xl py-3 px-4 text-lg font-bold">
                </div>
                <div>
                    <span class="platform-tag text-green-400">TADA</span>
                    <input type="number" id="in-tada" inputmode="decimal" placeholder="0" class="w-full rounded-2xl py-3 px-4 text-lg font-bold">
                </div>
            </div>

            <div class="mt-6 border-t border-white/5 pt-6">
                <h2 class="text-sm font-bold text-gray-400 mb-4 flex items-center">
                    <span class="w-1.5 h-1.5 bg-red-500 rounded-full mr-2"></span> 支出明細
                </h2>
                
                <div class="flex gap-2 mb-4">
                    <input type="number" id="new-exp-val" inputmode="decimal" placeholder="金額" class="flex-1 rounded-xl py-2 px-4 text-sm font-bold">
                    <button onclick="addExpenseInline()" class="bg-red-500 text-white px-5 rounded-xl font-bold active-press text-sm whitespace-nowrap">新增</button>
                </div>
                
                <div id="expense-list" class="space-y-2 mb-4 max-h-40 overflow-y-auto pr-1 text-xs text-gray-400"></div>

                <div class="flex items-center justify-between bg-red-500/10 border border-red-500/20 rounded-2xl p-4">
                    <span class="text-red-400 font-bold text-xs uppercase tracking-tighter">當日支出總計</span>
                    <span class="text-lg font-black text-red-500">$<span id="display-total-exp">0</span></span>
                </div>
            </div>
        </section>

        <!-- 圖表與分析 -->
        <section class="glass-card rounded-3xl p-5 shadow-xl">
            <div class="flex justify-between items-center mb-1">
                <h2 class="font-bold text-lg text-white">本週趨勢</h2>
                <button onclick="clearAll()" class="text-[9px] text-gray-600 border border-gray-800 px-2 py-1 rounded-lg">清空數據</button>
            </div>

            <div>
                <div id="chart-container" class="bar-container border-b border-white/10"></div>
                <div class="flex justify-between mt-2 mb-4 text-[10px] text-gray-500 font-bold text-center uppercase">
                    <span class="flex-1">一</span><span class="flex-1">二</span><span class="flex-1">三</span><span class="flex-1">四</span><span class="flex-1">五</span><span class="flex-1">六</span><span class="flex-1">日</span>
                </div>

                <!-- 顏色標記 -->
                <div class="flex flex-wrap justify-center gap-x-4 gap-y-2 py-3 border-t border-white/5">
                    <div class="flex items-center text-[9px] font-bold text-gray-500 uppercase tracking-widest"><span class="legend-dot bg-blue-500"></span> Uber</div>
                    <div class="flex items-center text-[9px] font-bold text-gray-500 uppercase tracking-widest"><span class="legend-dot bg-orange-500"></span> 高德</div>
                    <div class="flex items-center text-[9px] font-bold text-gray-500 uppercase tracking-widest"><span class="legend-dot bg-yellow-500"></span> 滴滴</div>
                    <div class="flex items-center text-[9px] font-bold text-gray-500 uppercase tracking-widest"><span class="legend-dot bg-green-500"></span> Tada</div>
                </div>
            </div>
            
            <div id="stats-content"></div>
        </section>
    </div>

    <script>
        const STORAGE_KEY = 'driver_income_v9_auto_rollover';
        let db = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        let currentDayExpenses = [];
        let selectedDate = "";
        let saveTimer;

        // 核心功能：獲取今天日期 (YYYY-MM-DD)
        function getTodayStr() {
            return new Date().toISOString().split('T')[0];
        }

        // 自動檢測午夜更新
        function checkDateRollover() {
            const today = getTodayStr();
            // 如果目前選取的日期就是今天，且系統日期變了，就自動切換
            if (selectedDate !== today) {
                console.log("偵測到日期變更，自動更新至: " + today);
                loadDateData(today);
            }
        }

        function getWeekKeys(base) {
            const now = new Date(base);
            const day = now.getDay();
            const diff = now.getDate() - (day === 0 ? 6 : day - 1);
            const start = new Date(now.setDate(diff));
            const keys = [];
            for (let i = 0; i < 7; i++) {
                const t = new Date(start);
                t.setDate(start.getDate() + i);
                keys.push(t.toISOString().split('T')[0]);
            }
            return keys;
        }

        function loadDateData(dateStr) {
            selectedDate = dateStr;
            document.getElementById('date-input').value = dateStr;
            const d = new Date(dateStr);
            document.getElementById('display-date-text').innerText = d.toLocaleDateString('zh-HK', { month: 'long', day: 'numeric', weekday: 'short' }) + " 📅";
            
            const data = db[dateStr] || { u: 0, a: 0, d: 0, t: 0, e_list: [] };
            document.getElementById('in-uber').value = data.u || "";
            document.getElementById('in-amap').value = data.a || "";
            document.getElementById('in-didi').value = data.d || "";
            document.getElementById('in-tada').value = data.t || "";
            currentDayExpenses = data.e_list || [];
            
            renderExpenses();
            updateUI();
        }

        function updateUI() {
            const u = parseFloat(document.getElementById('in-uber').value) || 0;
            const a = parseFloat(document.getElementById('in-amap').value) || 0;
            const d = parseFloat(document.getElementById('in-didi').value) || 0;
            const t = parseFloat(document.getElementById('in-tada').value) || 0;
            const totalE = currentDayExpenses.reduce((s, v) => s + v, 0);
            const profit = (u + a + d + t) - totalE;

            document.getElementById('top-profit').innerText = `$${Math.round(profit).toLocaleString()}`;
            document.getElementById('display-total-exp').innerText = totalE.toLocaleString();

            // 自動儲存至資料庫
            db[selectedDate] = { u, a, d, t, e_list: [...currentDayExpenses], e_total: totalE };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));

            const ind = document.getElementById('autosave-indicator');
            ind.style.opacity = "1";
            clearTimeout(saveTimer);
            saveTimer = setTimeout(() => ind.style.opacity = "0", 800);

            refreshCharts(u, a, d, t, totalE);
        }

        function addExpenseInline() {
            const input = document.getElementById('new-exp-val');
            const val = parseFloat(input.value);
            if (!isNaN(val) && val > 0) {
                currentDayExpenses.push(val);
                input.value = "";
                renderExpenses();
                updateUI();
            }
        }

        function removeExpense(idx) {
            currentDayExpenses.splice(idx, 1);
            renderExpenses();
            updateUI();
        }

        function renderExpenses() {
            const el = document.getElementById('expense-list');
            if (currentDayExpenses.length === 0) {
                el.innerHTML = `<p class="text-gray-600 italic py-2">本日無支出紀錄</p>`;
                return;
            }
            el.innerHTML = currentDayExpenses.map((v, i) => `
                <div class="flex justify-between items-center bg-white/5 p-2 rounded-xl mb-1 border border-white/5">
                    <span class="text-gray-500">項目 ${i+1}</span>
                    <div class="flex items-center gap-2">
                        <span class="font-bold text-red-400">$${v}</span>
                        <button onclick="removeExpense(${i})" class="text-red-500 px-2 font-black">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function refreshCharts(currU, currA, currD, currT, currE) {
            const week = getWeekKeys(selectedDate);
            let totals = [];
            let maxVal = 100;
            let weekData = { in: 0, out: 0 };

            week.forEach(k => {
                let day = (k === selectedDate) ? { u: currU, a: currA, d: currD, t: currT, e_total: currE } : (db[k] || { u: 0, a: 0, d: 0, t: 0, e_total: 0 });
                const sum = (day.u||0) + (day.a||0) + (day.d||0) + (day.t||0);
                totals.push({ key: k, sum, ...day });
                if (sum > maxVal) maxVal = sum;
                weekData.in += sum;
                weekData.out += (day.e_total || 0);
            });

            const container = document.getElementById('chart-container');
            container.innerHTML = totals.map(day => {
                const getH = (v) => v > 0 ? (v / maxVal * 100) : 0;
                const isSel = day.key === selectedDate;
                
                const renderSegment = (val, colorClass) => {
                    const h = getH(val);
                    if (h <= 0) return '';
                    return `<div class="w-full ${colorClass} bar-segment" style="height: ${h}%">${h > 8 ? `<span class="inner-label">${Math.round(val)}</span>` : ''}</div>`;
                };

                return `
                    <div class="flex-1 flex flex-col justify-end gap-0.5 relative h-full ${isSel ? 'bg-white/5 rounded-t-lg' : ''}">
                        <span class="bar-label-top ${isSel ? 'text-blue-400 font-black' : 'text-gray-600'}">${day.sum > 0 ? Math.round(day.sum) : ''}</span>
                        ${renderSegment(day.t, 'bg-green-500 rounded-t-sm')}
                        ${renderSegment(day.d, 'bg-yellow-500')}
                        ${renderSegment(day.a, 'bg-orange-500')}
                        ${renderSegment(day.u, 'bg-blue-500 rounded-b-sm')}
                        ${isSel ? '<div class="absolute -bottom-1.5 left-1/2 -translate-x-1/2 w-1 h-1 bg-blue-500 rounded-full"></div>' : ''}
                    </div>
                `;
            }).join('');

            document.getElementById('stats-content').innerHTML = `
                <div class="bg-white/5 p-4 rounded-2xl border border-white/10 mt-2">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs font-bold text-gray-500 tracking-widest uppercase">本週預估純利</span>
                        <span class="text-xl font-black text-green-500">$${(weekData.in - weekData.out).toLocaleString()}</span>
                    </div>
                    <div class="flex justify-between text-[9px] text-gray-600 font-bold uppercase">
                        <span>總流水: $${weekData.in.toLocaleString()}</span>
                        <span>總支出: $${weekData.out.toLocaleString()}</span>
                    </div>
                </div>
            `;
        }

        function clearAll() {
            if (confirm("確定清空所有數據紀錄？")) {
                localStorage.removeItem(STORAGE_KEY);
                db = {}; loadDateData(selectedDate);
            }
        }

        // 監聽輸入
        document.getElementById('date-input').addEventListener('change', (e) => loadDateData(e.target.value));
        ['in-uber', 'in-amap', 'in-didi', 'in-tada'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateUI);
        });

        // 初始化
        window.onload = () => {
            loadDateData(getTodayStr());
            
            // 每 60 秒檢查一次是否需要換天
            setInterval(checkDateRollover, 60000);
            
            // 監聽網頁從後台回到前台 (例如早上打開手機瀏覽器)
            document.addEventListener("visibilitychange", () => {
                if (document.visibilityState === 'visible') {
                    checkDateRollover();
                }
            });
        };
    </script>
</body>
</html>
