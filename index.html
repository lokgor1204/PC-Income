<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="司機助手">
    <title>司機收入助手 (V1.4.6)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-dim: #8e8e93;
            --border-color: #d1d1d6;
            --input-bg: #f2f2f7;
            --accent-blue: #0a84ff;
        }

        .dark-mode {
            --bg-color: #0f0f12;
            --card-bg: #1c1c1e;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --border-color: #3a3a3c;
            --input-bg: #2c2c2e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        .app-container {
            padding-top: calc(var(--safe-top) + 20px);
            padding-bottom: calc(var(--safe-bottom) + 80px);
            min-height: 100vh;
        }

        input, select {
            background: var(--input-bg) !important;
            border: 1.5px solid var(--border-color) !important;
            color: var(--text-main) !important;
            border-radius: 14px !important;
            padding: 12px !important;
            font-size: 16px !important;
            font-weight: 600 !important;
            height: 48px !important;
            outline: none;
            box-sizing: border-box !important;
            appearance: none;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .platform-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
        }

        /* 列表高度限制：約顯示兩筆 (動態高度) */
        .scroll-list {
            max-height: 116px; 
            overflow-y: auto;
            scrollbar-width: none;
        }
        .scroll-list::-webkit-scrollbar {
            display: none;
        }

        .list-item {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 10px 14px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* 移除固定 height 以免錯位 */
            min-height: 52px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-add {
            min-width: 54px;
            height: 48px;
            border-radius: 14px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
        }

        #date-input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            z-index: 10;
        }

        .bar-container {
            height: 150px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }
    </style>
</head>
<body class="px-4">
    <div class="app-container max-w-md mx-auto space-y-6">
        <header class="flex justify-between items-start">
            <div>
                <h1 class="text-2xl font-black italic tracking-tight">司機助手</h1>
                <div class="relative inline-block mt-1">
                    <p id="display-date-text" class="text-blue-500 font-bold underline decoration-dotted underline-offset-4 cursor-pointer">
                        載入中... 📅
                    </p>
                    <input type="date" id="date-input">
                </div>
            </div>
            <div class="text-right flex flex-col items-end">
                <span id="top-profit" class="text-3xl font-black text-green-500">$0</span>
                <button onclick="handleThemeToggle()" class="bg-gray-200 dark:bg-gray-800 p-2 rounded-xl mt-2">
                    <span id="theme-icon">🔆</span>
                </button>
            </div>
        </header>

        <section class="glass-card p-6">
            <!-- 收入區 -->
            <h2 class="text-[10px] font-black text-gray-400 mb-5 uppercase tracking-widest flex items-center">
                <span class="w-1.5 h-4 bg-blue-500 rounded-full mr-2"></span> 平台流水
            </h2>
            
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="platform-label text-black dark:text-white">UBER</label><input type="number" id="in-uber" inputmode="decimal" class="w-full" placeholder="0"></div>
                    <div><label class="platform-label text-blue-400">AMAP</label><input type="number" id="in-amap" inputmode="decimal" class="w-full" placeholder="0"></div>
                    <div><label class="platform-label text-orange-400">DIDI</label><input type="number" id="in-didi" inputmode="decimal" class="w-full" placeholder="0"></div>
                    <div><label class="platform-label text-yellow-500">TADA</label><input type="number" id="in-tada" inputmode="decimal" class="w-full" placeholder="0"></div>
                </div>
                
                <div>
                    <label class="platform-label text-purple-400">其他收入</label>
                    <div class="flex gap-2">
                        <input type="number" id="new-other-val" inputmode="decimal" placeholder="0" class="flex-1">
                        <button onclick="addOther()" class="btn-add bg-purple-500 active:scale-95 transition-transform">＋</button>
                    </div>
                </div>
            </div>

            <!-- 其他收入列表 (滾動式) -->
            <div id="other-list" class="scroll-list mt-4"></div>

            <div class="flex items-center justify-between bg-blue-500/10 p-4 rounded-2xl mt-4">
                <span class="text-blue-500 font-bold text-xs uppercase">今日總流水</span>
                <span class="text-xl font-black text-blue-500">$<span id="display-total-revenue">0</span></span>
            </div>

            <!-- 營運支出區 -->
            <div class="mt-8 pt-6 border-t border-gray-100 dark:border-gray-800">
                <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-widest flex items-center mb-4">
                    <span class="w-1.5 h-4 bg-red-500 rounded-full mr-2"></span> 營運支出
                </h2>
                
                <div class="flex gap-2 mb-4">
                    <select id="new-exp-cat" class="w-[100px] flex-shrink-0">
                        <option value="隧道">隧道</option>
                        <option value="油/電">油/電</option>
                        <option value="供車">供車</option>
                        <option value="抄牌">抄牌</option>
                        <option value="其他">其他</option>
                    </select>
                    <input type="number" id="new-exp-val" inputmode="decimal" placeholder="0" class="flex-1 min-w-0">
                    <button onclick="addExpense()" class="btn-add bg-red-600 active:scale-95 transition-transform">＋</button>
                </div>

                <!-- 支出紀錄列表 (滾動式) -->
                <div id="expense-list" class="scroll-list mb-4"></div>

                <div class="flex items-center justify-between bg-red-500/10 p-4 rounded-2xl border border-red-500/5">
                    <span class="text-red-500 font-bold text-xs uppercase tracking-wider">今日總支出</span>
                    <span class="text-xl font-black text-red-500">$<span id="display-total-expense">0</span></span>
                </div>
            </div>
        </section>

        <!-- 統計圖表 -->
        <section class="glass-card p-6 shadow-sm">
            <h2 class="font-black text-lg mb-4 italic">本週統計分析</h2>
            <div id="chart-container" class="bar-container mb-2"></div>
            <div class="flex justify-between text-[10px] text-gray-400 font-bold px-1">
                <span class="flex-1 text-center">一</span><span class="flex-1 text-center">二</span><span class="flex-1 text-center">三</span><span class="flex-1 text-center">四</span><span class="flex-1 text-center">五</span><span class="flex-1 text-center">六</span><span class="flex-1 text-center">日</span>
            </div>
            <div id="stats-content" class="mt-6"></div>
        </section>

        <footer class="text-center py-4 text-[10px] font-black text-gray-400 opacity-50 uppercase tracking-widest">
            Driver Assistant v1.4.6
        </footer>
    </div>

    <script>
        const MASTER_KEY = 'DRIVER_APP_DATA_V140';
        let db = JSON.parse(localStorage.getItem(MASTER_KEY) || '{}');
        let selectedDate = "";
        let isDarkMode = false;

        function initTheme() {
            const savedTheme = localStorage.getItem('THEME_PREF');
            isDarkMode = savedTheme ? (savedTheme === 'dark') : (new Date().getHours() < 6 || new Date().getHours() >= 18);
            applyTheme();
        }

        function handleThemeToggle() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('THEME_PREF', isDarkMode ? 'dark' : 'light');
            applyTheme();
        }

        function applyTheme() {
            document.body.classList.toggle('dark-mode', isDarkMode);
            document.getElementById('theme-icon').innerText = isDarkMode ? '🌙' : '🔆';
        }

        function loadDateData(dateStr) {
            selectedDate = dateStr;
            document.getElementById('date-input').value = dateStr;
            const d = new Date(dateStr);
            document.getElementById('display-date-text').innerText = d.toLocaleDateString('zh-HK', { month: 'long', day: 'numeric', weekday: 'short' }) + " 📅";
            
            if (!db[selectedDate]) db[selectedDate] = { u:0, a:0, d:0, t:0, o_list:[], e_list:[] };
            const data = db[selectedDate];
            document.getElementById('in-uber').value = data.u || "";
            document.getElementById('in-amap').value = data.a || "";
            document.getElementById('in-didi').value = data.d || "";
            document.getElementById('in-tada').value = data.t || "";
            
            renderOtherList();
            renderExpenseList();
            updateUI(false);
        }

        function updateUI(shouldSave = true) {
            const data = db[selectedDate];
            if (!data) return;

            data.u = parseFloat(document.getElementById('in-uber').value) || 0;
            data.a = parseFloat(document.getElementById('in-amap').value) || 0;
            data.d = parseFloat(document.getElementById('in-didi').value) || 0;
            data.t = parseFloat(document.getElementById('in-tada').value) || 0;
            
            const totalOther = (data.o_list || []).reduce((s, v) => s + v.val, 0);
            const totalE = (data.e_list || []).reduce((s, v) => s + v.val, 0);
            const totalIn = data.u + data.a + data.d + data.t + totalOther;
            const profit = totalIn - totalE;

            document.getElementById('top-profit').innerText = `$${Math.round(profit).toLocaleString()}`;
            document.getElementById('display-total-revenue').innerText = totalIn.toLocaleString();
            document.getElementById('display-total-expense').innerText = totalE.toLocaleString();

            if (shouldSave) {
                data.i_total = totalIn;
                data.e_total = totalE;
                localStorage.setItem(MASTER_KEY, JSON.stringify(db));
            }
            refreshCharts(totalIn, totalE);
        }

        function addOther() {
            const input = document.getElementById('new-other-val');
            const val = parseFloat(input.value);
            if (isNaN(val) || val <= 0) return;
            if (!db[selectedDate].o_list) db[selectedDate].o_list = [];
            db[selectedDate].o_list.unshift({ val, id: Date.now() });
            input.value = "";
            renderOtherList();
            updateUI(true);
            document.getElementById('other-list').scrollTop = 0;
        }

        function addExpense() {
            const input = document.getElementById('new-exp-val');
            const catSelect = document.getElementById('new-exp-cat');
            const val = parseFloat(input.value);
            if (isNaN(val) || val <= 0) return;
            if (!db[selectedDate].e_list) db[selectedDate].e_list = [];
            db[selectedDate].e_list.unshift({ cat: catSelect.value, val, id: Date.now() });
            input.value = "";
            renderExpenseList();
            updateUI(true);
            document.getElementById('expense-list').scrollTop = 0;
        }

        function renderOtherList() {
            const list = db[selectedDate].o_list || [];
            const el = document.getElementById('other-list');
            if (list.length === 0) {
                el.innerHTML = `<p class="text-center py-2 text-[10px] font-bold text-gray-400 italic">無額外收入</p>`;
                return;
            }
            el.innerHTML = list.map((item, i) => `
                <div class="list-item">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">其他收入</span>
                    <div class="flex items-center gap-3">
                        <span class="font-black text-lg text-purple-500">$${item.val.toLocaleString()}</span>
                        <button onclick="removeOther(${i})" class="text-red-500/40 p-1 text-sm">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function renderExpenseList() {
            const list = db[selectedDate].e_list || [];
            const el = document.getElementById('expense-list');
            if (list.length === 0) {
                el.innerHTML = `<p class="text-center py-2 text-[10px] font-bold text-gray-400 italic">無支出紀錄</p>`;
                return;
            }
            el.innerHTML = list.map((item, i) => `
                <div class="list-item">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">${item.cat}</span>
                    <div class="flex items-center gap-3">
                        <span class="font-black text-lg text-red-500">$${item.val.toLocaleString()}</span>
                        <button onclick="removeExpense(${i})" class="text-red-500/40 p-1 text-sm">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function removeOther(idx) {
            db[selectedDate].o_list.splice(idx, 1);
            renderOtherList();
            updateUI(true);
        }

        function removeExpense(idx) {
            db[selectedDate].e_list.splice(idx, 1);
            renderExpenseList();
            updateUI(true);
        }

        function refreshCharts(currIn, currE) {
            const now = new Date(selectedDate);
            const day = now.getDay();
            const diff = now.getDate() - (day === 0 ? 6 : day - 1);
            const start = new Date(new Date(selectedDate).setDate(diff));
            let maxVal = 1000;
            let weekData = { in: 0, out: 0 };
            let bars = [];
            for (let i = 0; i < 7; i++) {
                const t = new Date(start);
                t.setDate(start.getDate() + i);
                const k = t.toISOString().split('T')[0];
                const dayObj = (k === selectedDate) ? { i_total: currIn, e_total: currE } : (db[k] || { i_total: 0, e_total: 0 });
                bars.push({ sum: dayObj.i_total || 0, isSel: k === selectedDate });
                if ((dayObj.i_total || 0) > maxVal) maxVal = dayObj.i_total;
                weekData.in += (dayObj.i_total || 0);
                weekData.out += (dayObj.e_total || 0);
            }
            document.getElementById('chart-container').innerHTML = bars.map(b => `
                <div class="flex-1 flex flex-col justify-end h-full">
                    <div class="${b.isSel ? 'bg-blue-500' : 'bg-blue-500/20'} rounded-t-lg transition-all" style="height: ${Math.max((b.sum/maxVal*100), 4)}%"></div>
                </div>
            `).join('');
            document.getElementById('stats-content').innerHTML = `
                <div class="bg-green-500/10 p-5 rounded-2xl border border-green-500/20 flex justify-between items-center">
                    <div><p class="text-[10px] font-black text-gray-400 uppercase">本週純利</p><p class="text-2xl font-black text-green-500">$${Math.round(weekData.in - weekData.out).toLocaleString()}</p></div>
                    <div class="text-right text-[10px] font-bold text-gray-400"><p>流水: $${Math.round(weekData.in).toLocaleString()}</p><p class="text-red-500">支出: $${Math.round(weekData.out).toLocaleString()}</p></div>
                </div>
            `;
        }

        window.onload = () => {
            initTheme();
            const today = new Date();
            const localDate = new Date(today.getTime() - (today.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            loadDateData(localDate);
        };

        document.getElementById('date-input').onchange = (e) => loadDateData(e.target.value);
        ['in-uber', 'in-amap', 'in-didi', 'in-tada'].forEach(id => {
            document.getElementById(id).oninput = () => updateUI(true);
        });
    </script>
</body>
</html>
